name: Generate GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-stats:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Overview Card ──────────────────────────────────────────
      - name: Generate Overview Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Aniket-Asawale
          template: classic
          config_timezone: Asia/Kolkata
          config_display: large

          # Show only commits, PRs, issues, repos, contributions
          base: header, activity, repositories, metadata
          base_indepth: yes

          # Hide noisy / sensitive counters
          extras_css: |
            [data-name="following"], [data-name="watching"],
            [data-name="sponsors"], [data-name="starred"] { display: none !important; }

          output_action: commit
          committer_message: "chore: update overview metrics"
          committer_branch: main
          filename: github-metrics.svg

      # ── Languages Card ─────────────────────────────────────────
      - name: Generate Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Aniket-Asawale
          template: classic
          config_timezone: Asia/Kolkata

          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used
          plugin_languages_limit: 8
          plugin_languages_details: percentage, bytes-size
          plugin_languages_analysis_timeout: 30
          plugin_languages_colors: github
          plugin_languages_categories: programming

          output_action: commit
          committer_message: "chore: update language stats"
          committer_branch: main
          filename: languages.svg

      # ── Isometric Contribution Calendar ─────────────────────────
      - name: Generate Isometric Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Aniket-Asawale
          template: classic
          config_timezone: Asia/Kolkata

          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          output_action: commit
          committer_message: "chore: update isometric calendar"
          committer_branch: main
          filename: isocalendar.svg
